<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .basic-transition {
        width: 50px;
        height: 50px;
        background-color: red;
        transition: 2s;
      }
      .basic-transition:hover {
        background-color: blue;
        width: 300px;
        transition: 2s all ease-in-out;
      }

      .steps {
        margin-top: 50px;
        width: 50px;
        height: 50px;
        background-color: red;
        transition: 2s all steps(2);
      }

      .steps:hover {
        background-color: yellow;
        transform: translateX(300px);
        transition: 2s all steps(10);
      }

      .bounce {
                margin-top: 50px;
        width: 50px;
        height: 50px;
        border-radius: 50px;
        background-color: green;
        animation-name: bounce;
        animation-duration: 1s;
        animation-direction: alternate;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }
      @keyframes bounce {
        from {
          background-color: green;
          transform: translateY(0);
        }
        to {
          background-color: red;
          transform: translateY(100px);
        }
      }

      .scale {
                margin-top: 50px;
        width: 50px;
        height: 50px;
        background-color: red;
      }
      .scale:hover {
        animation: scale 1s alternate 10 linear;
      }

      @keyframes scale {
        0% {
          background-color: green;
          transform: scaleX(1);
        }
        50% {
          background-color: yellow;
          transform: scaleX(10);
        }
        100% {
          background-color: blue;
          transform: scaleX(15);
        }
      }

      .marquee{
                margin-top: 50px;
        width: 100%;
        overflow: hidden;
      }
      .scroll{
        animation: scroll 2s reverse infinite linear;
      }
      @keyframes scroll {
        0%{
            transform: translateX(0);
        }
        100%{
            transform: translateX(-100%);
        }
        0%{
            transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="basic-transition">

  </div>

  <div class="container">
    <div class="steps">

  </div>
  </div>

    <div class="bounce">

  </div>

    <div class="scale"></div>


    <div class="marquee">
        <div class="scroll">
            Scrolling Text
        </div>
    </div>

  </body>
</html>
